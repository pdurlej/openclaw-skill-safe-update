name: OpenClaw upgrade experience
description: Share a successful upgrade, blocker, regression, or reusable lesson.
title: "[upgrade] "
labels:
  - upgrade-report
body:
  - type: markdown
    attributes:
      value: |
        Thanks for helping improve safe OpenClaw upgrades. Share only sanitized technical evidence. Never include secrets, conversations, private audio, production databases, or unredacted configuration and logs.
  - type: input
    id: versions
    attributes:
      label: Current and target versions
      description: Use exact versions, for example 2026.6.11 to 2026.7.1.
      placeholder: 2026.6.11 -> 2026.7.1
    validations:
      required: true
  - type: dropdown
    id: installation
    attributes:
      label: Installation shape
      options:
        - npm-global on Linux
        - Docker or container
        - Source checkout
        - Other
    validations:
      required: true
  - type: input
    id: environment
    attributes:
      label: Environment
      description: Operating system, architecture, Node version, and public package/plugin names.
      placeholder: Ubuntu 24.04, x86_64, Node 24, Matrix and Signal plugins
    validations:
      required: true
  - type: dropdown
    id: outcome
    attributes:
      label: Outcome
      options:
        - Successful and uneventful
        - Successful with a workaround
        - Blocked before activation
        - Regressed after activation
        - Forward recovery required
    validations:
      required: true
  - type: checkboxes
    id: affected-surfaces
    attributes:
      label: Affected surfaces
      description: Select every surface involved in the result.
      options:
        - label: Package install or lifecycle scripts
        - label: Node or native dependency compatibility
        - label: Signal, Matrix, or another channel
        - label: Attachments or voice
        - label: MCP discovery or calls
        - label: Memory or persona continuity
        - label: Provider authentication or quota
        - label: Gateway, service manager, or filesystem ownership
        - label: Backup, rollback, or forward recovery
  - type: dropdown
    id: detection
    attributes:
      label: When was it detected?
      options:
        - Inventory or target metadata review
        - Synthetic package rehearsal
        - Customization or coverage gate
        - Activation or restart
        - Post-upgrade E2E
        - Later in production
    validations:
      required: true
  - type: textarea
    id: experience
    attributes:
      label: What happened?
      description: Describe the phase, symptom, expected behavior, and observed behavior.
    validations:
      required: true
  - type: textarea
    id: evidence
    attributes:
      label: Sanitized evidence
      description: Include public package coordinates, checksums, redacted error names, or links to a minimal reproduction.
  - type: textarea
    id: resolution
    attributes:
      label: Resolution or workaround
      description: What fixed it, or what evidence is still missing?
  - type: textarea
    id: rollback
    attributes:
      label: Rollback or forward recovery evidence
      description: What path was available, and was it actually verified? Do not include private paths or values.
  - type: checkboxes
    id: safety
    attributes:
      label: Safety check
      options:
        - label: I removed secrets, tokens, private conversations, private audio, production databases, and unredacted configuration/logs.
          required: true
        - label: I understand that a green rehearsal is not approval to update a live runtime.
          required: true
