name: Validate skill

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: '3.12'
      - name: Compile
        run: python3 -m py_compile scripts/openclaw_safe_update.py
      - name: Test
        run: python3 -m unittest discover -s tests -v
      - name: Validate the OpenClaw skill package with ClawHub
        env:
          NPM_CONFIG_CACHE: ${{ runner.temp }}/npm-cache
        run: |
          npx --yes clawhub@0.23.1 skill publish . \
            --slug safe-upgrade-rehearsal \
            --name "OpenClaw Safe Upgrade Rehearsal Kit" \
            --owner pdurlej \
            --version 1.1.0 \
            --changelog "Add installation inventory, hard coverage gate, package metadata risks, and generated post-upgrade E2E and operator plans." \
            --topics "dry-run,upgrade-rehearsal,release-engineering,supply-chain-security" \
            --dry-run \
            --json
